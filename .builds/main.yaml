submitter:
  git.sr.ht:
    enabled: true
    allow-refs:
      - refs/heads/main
      - "refs/tags/*"
image: nixos/unstable
environment:
  NIX_CONFIG: "experimental-features = nix-command flakes"
  PROJECT: smoothflake
sources:
  - https://git.sr.ht/~bzm/smoothflake
tasks:
  - check: |
      cd $PROJECT
      nix flake check --all-systems
  - check-template-default: |
      cd $PROJECT/templates/default
      nix flake check --all-systems
